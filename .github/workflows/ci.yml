name: CI Pipeline

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  MODEL_OUTPUT_DIR: "artifacts/ci"

jobs:
  build:
    name: Build and Train
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model and generate evaluation files
        run: python src/model.py --output-dir "${{ env.MODEL_OUTPUT_DIR }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: ${{ env.MODEL_OUTPUT_DIR }}
          retention-days: 5

  test:
    name: Test and Validate
    runs-on: ubuntu-latest
    needs: build
    env:
      MODEL_OUTPUT_DIR: "artifacts/ci"
      MINIMUM_ACCURACY: "0.90"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: ${{ env.MODEL_OUTPUT_DIR }}

      - name: Run automated tests
        run: pytest tests/test_model.py -q

  report:
    name: Prepare Report Inputs
    runs-on: ubuntu-latest
    needs: test
    env:
      MODEL_OUTPUT_DIR: "artifacts/ci"

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download validated artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: ${{ env.MODEL_OUTPUT_DIR }}

      - name: Verify report inputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          output_dir = Path("artifacts/ci")
          metrics_path = output_dir / "metrics.json"
          image_path = output_dir / "confusion_matrix.png"

          if not metrics_path.exists():
              raise FileNotFoundError(f"Missing metrics file: {metrics_path}")
          if not image_path.exists():
              raise FileNotFoundError(f"Missing image file: {image_path}")

          metrics = json.loads(metrics_path.read_text(encoding="utf-8"))
          accuracy = metrics.get("accuracy")
          if accuracy is None:
              raise ValueError("metrics.json does not contain an accuracy value")

          print(f"Report input accuracy: {accuracy:.2f}")
          PY

      - name: Upload report artifact for CD
        uses: actions/upload-artifact@v4
        with:
          name: report-inputs
          path: |
            ${{ env.MODEL_OUTPUT_DIR }}/confusion_matrix.png
            ${{ env.MODEL_OUTPUT_DIR }}/metrics.json
            ${{ env.MODEL_OUTPUT_DIR }}/metrics.txt
            ${{ env.MODEL_OUTPUT_DIR }}/iris_model.joblib
          retention-days: 5
